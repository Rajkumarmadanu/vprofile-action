name: vprofile actions
on: workflow_dispatch
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: imagesrepo
  EKS_CLUSTER: vprofile-EKS

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Maven Test
        run: mvn test
      
      - name: checkstyle
        run: mvn checkstyle:checkstyle

      #setup java 17 to be default (sonar-scanner requirement as of 5.x)
      - name: set java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' #see 'supported distributions for availability'
          java-version: '17'

      ### run sonar-scanner
      - name: sonarqube scanner
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar
          -Dsonar.host.url=${{ secrets.SONAR_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}


      # Check the quality gate status
      #- name: Sonar quality gate Check
       # id: sonarqube-quality-gate-check
        #uses: sonarsource/sonar-quality-gate-action@master
        # Force to fall sleep after specific time
        #timeout-minutes: 5
