name: vprofile actions
on: workflow_dispatch
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: imagesrepo
  EKS_CLUSTER: vprofile-EKS

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Maven Test
        run: mvn test jacoco:report
      
      - name: checkstyle
        run: mvn checkstyle:checkstyle

      #setup java 11 to be deafult (sonar-scanner requirement as of 5.x)
      - name: set java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' #see 'supported distributions for availability'
          java-version: '11'

      ### run sonar-scanner
      - name: sonarqube scanner
        uses: sonarsource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/
            -Dsonar.junit.reportsPaths=target/surefire-reports/
            -Dsonar.jacoco.reportsPaths=target/jacoco.exec
            -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
            -Dsonar.java.binaries=target/classes


