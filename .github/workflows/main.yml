name: vprofile actions
on: workflow_dispatch
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: imagesrepo
  EKS_CLUSTER: vprofile-EKS

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Maven Test
        run: mvn test
      
      - name: checkstyle
        run: mvn checkstyle:checkstyle

      #setup java 17 to be default (sonar-scanner requirement as of 5.x)
      - name: set java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' #see 'supported distributions for availability'
          java-version: '17'

      ### run sonar-scanner
      - name: sonarqube scanner
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}


      # Check the quality gate status
      #- name: Sonar quality gate Check
       # id: sonarqube-quality-gate-check
        #uses: sonarsource/sonar-quality-gate-action@master
        # Force to fall sleep after specific time
        #timeout-minutes: 5
        #env:
         # SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: ${{ secrets.SONAR_URL }} #optional#

  BUILD_AND_PUBLISH:
  needs: Testing
  runs-on: ubuntu-latest
  steps:
    - name: code checkout
      uses: actions/checkout@v4

    - name: upload image to ECR
      uses: appleboy/docker-ecr-action@master
      with:
        access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        registry: ${{ secrets.REGISTRY }}
        repo: ${{ env.ECR_REPOSITORY }}
        region: ${{ env.AWS_REGION }}
        tags: latest,${{ github.run_number }}
        daemon_off: false
        dockerfile: ./Dockerfile
        context: ./
